[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Sitemap rewrite
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 200

# Suite refactor redirects — preserve existing URLs
[[redirects]]
  from = "/aifind"
  to = "/shine"
  status = 301

[[redirects]]
  from = "/aifind/generate"
  to = "/generate"
  status = 301

[[redirects]]
  from = "/aifind/directory"
  to = "/directory"
  status = 301

[[redirects]]
  from = "/shine/generate"
  to = "/generate"
  status = 301

[[redirects]]
  from = "/shine/directory"
  to = "/directory"
  status = 301

# Trailing slash removal
[[redirects]]
  from = "/:splat/"
  to = "/:splat"
  status = 301
  force = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.agentdoor.ai"
