<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Murmur — a murmuration you can touch</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:#1F1A33;}
  body{font-family:"Hanken Grotesk",system-ui,sans-serif;-webkit-user-select:none;user-select:none;}
  canvas{display:block;touch-action:none;cursor:none;}
  .top{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;pointer-events:none;}
  .wm{color:#fff;display:flex;align-items:baseline;gap:10px;text-shadow:0 1px 10px rgba(20,15,40,.5);}
  .wm .n{font-weight:800;font-size:19px;letter-spacing:-.01em;}
  .wm .tag{font-family:"Newsreader",serif;font-style:italic;font-size:13.5px;opacity:.75;}
  .ctrls{display:flex;gap:10px;pointer-events:auto;}
  .cbtn{background:rgba(24,18,44,.55);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,.22);
    border-radius:999px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .2s;}
  .cbtn:hover{background:rgba(255,255,255,.14);}
  .cbtn.on{background:#F4B8C8;color:#33203a;border-color:#F4B8C8;}
  .lft{display:flex;align-items:center;gap:14px;}
  a.cbtn{text-decoration:none;pointer-events:auto;display:inline-block;}
  .hint{position:fixed;bottom:22px;left:0;right:0;text-align:center;z-index:5;pointer-events:none;
    color:rgba(255,255,255,.72);font-family:"Newsreader",serif;font-style:italic;font-size:15px;
    text-shadow:0 1px 8px rgba(20,15,40,.6);transition:opacity .8s;}
  .hint.hide{opacity:0;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="top">
  <div class="lft"><a class="cbtn" href="/">← the door</a><div class="wm"><span class="n">Murmur</span><span class="tag">a murmuration you can touch</span></div></div>
  <div class="ctrls">
    <button class="cbtn on" id="bMode">you are: the falcon</button>
    <button class="cbtn" id="bFlock">flock: full</button>
    <button class="cbtn" id="bSound">sound: on</button>
  </div>
</div>
<div class="hint" id="hint">move through them · they remember you're a predator · hold still and they forget</div>
<script src="flock.js"></script>
</body>
</html>
